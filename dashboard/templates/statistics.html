{% extends "base.html" %}

{% block content %}
<div x-data="statisticsPage()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold text-gray-900">Statistics</h2>
        <button @click="loadStats" class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
            <i class="fas fa-rotate-right mr-2"></i>
            Refresh
        </button>
    </div>

    <template x-if="error">
        <div class="mb-6 p-4 text-red-700 bg-red-50 border border-red-100 rounded-lg" x-text="error"></div>
    </template>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-white p-6 rounded-lg shadow">
            <p class="text-sm text-gray-500">Total Runs</p>
            <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.total_runs">0</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
            <p class="text-sm text-gray-500">Total Findings</p>
            <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.total_findings">0</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
            <p class="text-sm text-gray-500">Runs (24h)</p>
            <p class="text-3xl font-bold text-gray-900 mt-2" x-text="stats.recent_runs_24h">0</p>
        </div>
        <div class="bg-white p-6 rounded-lg shadow">
            <p class="text-sm text-gray-500">Health Status</p>
            <p class="text-3xl font-bold mt-2" :class="healthClass(stats.health_status)" x-text="stats.health_status">healthy</p>
        </div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-lg font-medium text-gray-900 mb-4">Findings by Severity</h3>
        <div class="space-y-4">
            <template x-for="item in severityRows()" :key="item.label">
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="font-medium text-gray-700" x-text="item.label"></span>
                        <span class="text-gray-600" x-text="item.value"></span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div class="h-2 rounded-full" :class="item.color" :style="`width: ${item.percent}%`"></div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function statisticsPage() {
        return {
            error: '',
            stats: {
                total_runs: 0,
                total_findings: 0,
                recent_runs_24h: 0,
                health_status: 'healthy',
                severity_counts: { Critical: 0, High: 0, Medium: 0, Low: 0 }
            },

            async init() {
                await this.loadStats();
            },

            async loadStats() {
                try {
                    this.error = '';
                    const response = await fetch('/api/statistics');
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    this.stats = await response.json();
                } catch (error) {
                    this.error = `Failed to load statistics: ${error.message}`;
                }
            },

            healthClass(status) {
                if (status === 'critical') return 'text-red-600';
                if (status === 'warning') return 'text-yellow-600';
                return 'text-green-600';
            },

            severityRows() {
                const counts = this.stats.severity_counts || {};
                const total = Object.values(counts).reduce((acc, value) => acc + (value || 0), 0);
                const denominator = total > 0 ? total : 1;

                return [
                    { label: 'Critical', value: counts.Critical || 0, color: 'bg-red-500' },
                    { label: 'High', value: counts.High || 0, color: 'bg-orange-500' },
                    { label: 'Medium', value: counts.Medium || 0, color: 'bg-yellow-500' },
                    { label: 'Low', value: counts.Low || 0, color: 'bg-blue-500' }
                ].map((item) => ({
                    ...item,
                    percent: Math.round((item.value / denominator) * 100)
                }));
            }
        };
    }
</script>
{% endblock %}
