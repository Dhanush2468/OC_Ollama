{% extends "base.html" %}

{% block content %}
<div x-data="findingsPage()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold text-gray-900">Findings</h2>
        <button @click="loadFindings" class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
            <i class="fas fa-rotate-right mr-2"></i>
            Refresh
        </button>
    </div>

    <div class="bg-white shadow rounded-lg p-4 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Severity</label>
                <select x-model="filters.severity" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="">All</option>
                    <option value="Critical">Critical</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Search</label>
                <input x-model="filters.search" type="text" placeholder="Search issue or recommendation"
                       class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="flex items-end gap-2">
                <button @click="applyFilters" class="px-4 py-2 rounded-md text-white bg-blue-600 hover:bg-blue-700 text-sm font-medium">
                    Apply
                </button>
                <button @click="resetFilters" class="px-4 py-2 rounded-md border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 text-sm font-medium">
                    Reset
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white shadow rounded-lg overflow-hidden">
        <template x-if="error">
            <div class="p-6 text-red-700 bg-red-50 border-b border-red-100" x-text="error"></div>
        </template>

        <template x-if="!error && findings.length === 0">
            <p class="text-gray-500 text-center py-10">No findings found</p>
        </template>

        <template x-if="findings.length > 0">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Timestamp</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Run ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Severity</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Issue</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Recommendation</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="finding in findings" :key="finding.id">
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" x-text="formatDate(finding.timestamp)"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-blue-600">
                                    <a :href="`/runs/${finding.run_id}`" x-text="finding.run_id"></a>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" x-text="finding.severity"></td>
                                <td class="px-6 py-4 text-sm text-gray-700" x-text="finding.issue"></td>
                                <td class="px-6 py-4 text-sm text-gray-600" x-text="finding.recommendation || '-' "></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function findingsPage() {
        return {
            findings: [],
            error: '',
            filters: {
                severity: '',
                search: ''
            },

            async init() {
                await this.loadFindings();
            },

            async loadFindings() {
                try {
                    this.error = '';
                    const params = new URLSearchParams({ page: '1', page_size: '100' });

                    if (this.filters.severity) {
                        params.set('severity', this.filters.severity);
                    }
                    if (this.filters.search.trim()) {
                        params.set('search', this.filters.search.trim());
                    }

                    const response = await fetch(`/api/findings?${params.toString()}`);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const data = await response.json();
                    this.findings = data.items || [];
                } catch (error) {
                    this.error = `Failed to load findings: ${error.message}`;
                    this.findings = [];
                }
            },

            async applyFilters() {
                await this.loadFindings();
            },

            async resetFilters() {
                this.filters.severity = '';
                this.filters.search = '';
                await this.loadFindings();
            },

            formatDate(value) {
                if (!value) return '-';
                return new Date(value).toLocaleString();
            }
        };
    }
</script>
{% endblock %}
