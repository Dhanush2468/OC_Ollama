<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Operation Console Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center space-x-4">
                        <i class="fas fa-chart-line text-3xl text-blue-600"></i>
                        <h1 class="text-2xl font-bold text-gray-900">Operation Console Monitor</h1>
                    </div>
                    <div class="flex items-center space-x-4">
                        <span id="status-indicator" class="flex items-center text-sm">
                            <span class="h-3 w-3 bg-green-500 rounded-full mr-2"></span>
                            <span class="text-gray-700">System Healthy</span>
                        </span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Navigation -->
        <nav class="bg-white border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex space-x-8">
                    <a href="/" class="border-b-2 border-blue-500 py-4 px-1 text-sm font-medium text-blue-600">
                        <i class="fas fa-home mr-2"></i>Dashboard
                    </a>
                    <a href="/runs" class="border-b-2 border-transparent py-4 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300">
                        <i class="fas fa-list mr-2"></i>Runs
                    </a>
                    <a href="/findings" class="border-b-2 border-transparent py-4 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300">
                        <i class="fas fa-exclamation-triangle mr-2"></i>Findings
                    </a>
                    <a href="/statistics" class="border-b-2 border-transparent py-4 px-1 text-sm font-medium text-gray-500 hover:text-gray-700 hover:border-gray-300">
                        <i class="fas fa-chart-bar mr-2"></i>Statistics
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                {% block content %}{% endblock %}
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-gray-200 py-4">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <p class="text-center text-sm text-gray-500">
                    Operation Console Monitor v1.0.0 | Powered by FastAPI & SQLite
                </p>
            </div>
        </footer>
    </div>

    <!-- Global Scripts -->
    <script>
        // Update system status
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                const indicator = document.getElementById('status-indicator');
                
                if (data.status === 'idle') {
                    indicator.innerHTML = `
                        <span class="h-3 w-3 bg-green-500 rounded-full mr-2"></span>
                        <span class="text-gray-700">System Idle</span>
                    `;
                }
            } catch (error) {
                console.error('Failed to fetch status:', error);
            }
        }

        // Update status every 30 seconds
        updateStatus();
        setInterval(updateStatus, 30000);
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
