{% extends "base.html" %}

{% block content %}
<div x-data="dashboard()">
    <!-- Stats Grid -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
        <!-- Total Runs -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
            <div class="p-5">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-play-circle text-4xl text-blue-500"></i>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">Total Runs</dt>
                            <dd class="text-3xl font-bold text-gray-900" x-text="stats.total_runs">-</dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Issues -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
            <div class="p-5">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-exclamation-circle text-4xl text-red-500"></i>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">Active Issues</dt>
                            <dd class="text-3xl font-bold text-gray-900" x-text="stats.critical_findings + stats.high_findings">-</dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>

        <!-- Last 24h Runs -->
        <div class="bg-white overflow-hidden shadow rounded-lg">
            <div class="p-5">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <i class="fas fa-clock text-4xl text-green-500"></i>
                    </div>
                    <div class="ml-5 w-0 flex-1">
                        <dl>
                            <dt class="text-sm font-medium text-gray-500 truncate">Last 24h</dt>
                            <dd class="text-3xl font-bold text-gray-900" x-text="stats.recent_runs_24h">-</dd>
                        </dl>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Runs -->
    <div class="bg-white shadow rounded-lg p-6 mb-8">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-medium text-gray-900">Recent Monitoring Runs</h2>
            <a href="/runs" class="text-sm text-blue-600 hover:text-blue-800">View All →</a>
        </div>
        
        <template x-if="runs.length === 0">
            <p class="text-gray-500 text-center py-8">No monitoring runs yet</p>
        </template>

        <template x-if="runs.length > 0">
            <div class="overflow-hidden">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Run ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Time</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Mode</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Findings</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="run in runs" :key="run.id">
                            <tr class="hover:bg-gray-50 cursor-pointer" @click="window.location=`/runs/${run.id}`">
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-blue-600" x-text="run.id"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatTime(run.timestamp)"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="run.execution_mode"></td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                          :class="getStatusClass(run.overall_status)"
                                          x-text="run.overall_status || 'unknown'"></span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="run.findings_count"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>

    <!-- Actions -->
    <div class="flex space-x-4">
        <a href="/runs" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700">
            <i class="fas fa-list mr-2"></i>
            View All Runs
        </a>
        <a href="/statistics" class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
            <i class="fas fa-chart-bar mr-2"></i>
            View Statistics
        </a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function dashboard() {
        return {
            stats: {
                total_runs: 0,
                total_findings: 0,
                critical_findings: 0,
                high_findings: 0,
                recent_runs_24h: 0
            },
            runs: [],

            async init() {
                await this.loadStats();
                await this.loadRecentRuns();
            },

            async loadStats() {
                try {
                    const response = await fetch('/api/statistics');
                    this.stats = await response.json();
                } catch (error) {
                    console.error('Failed to load statistics:', error);
                }
            },

            async loadRecentRuns() {
                try {
                    const response = await fetch('/api/runs?page=1&page_size=5');
                    const data = await response.json();
                    this.runs = data.items;
                } catch (error) {
                    console.error('Failed to load runs:', error);
                }
            },

            formatTime(timestamp) {
                const date = new Date(timestamp);
                return date.toLocaleString();
            },

            getStatusClass(status) {
                const statusClasses = {
                    'healthy': 'bg-green-100 text-green-800',
                    'warning': 'bg-yellow-100 text-yellow-800',
                    'critical': 'bg-red-100 text-red-800',
                    'complete': 'bg-blue-100 text-blue-800',
                    'unknown': 'bg-gray-100 text-gray-800'
                };
                return statusClasses[status] || statusClasses.unknown;
            }
        }
    }
</script>
{% endblock %}
