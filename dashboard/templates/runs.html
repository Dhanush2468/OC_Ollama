{% extends "base.html" %}

{% block content %}
<div x-data="runsPage()" x-init="init()">
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold text-gray-900">Monitoring Runs</h2>
        <button @click="loadRuns" class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
            <i class="fas fa-rotate-right mr-2"></i>
            Refresh
        </button>
    </div>

    <div class="bg-white shadow rounded-lg p-4 mb-6">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Execution Mode</label>
                <select x-model="filters.execution_mode" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="">All</option>
                    <option value="monitor">monitor</option>
                    <option value="oc_workflow">oc_workflow</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Status</label>
                <select x-model="filters.status" class="w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    <option value="">All</option>
                    <option value="healthy">healthy</option>
                    <option value="warning">warning</option>
                    <option value="critical">critical</option>
                    <option value="complete">complete</option>
                </select>
            </div>
            <div class="md:col-span-2 flex items-end gap-2">
                <button @click="applyFilters" class="px-4 py-2 rounded-md text-white bg-blue-600 hover:bg-blue-700 text-sm font-medium">
                    Apply Filters
                </button>
                <button @click="resetFilters" class="px-4 py-2 rounded-md border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 text-sm font-medium">
                    Reset
                </button>
            </div>
        </div>
    </div>

    <div class="bg-white shadow rounded-lg overflow-hidden">
        <template x-if="error">
            <div class="p-6 text-red-700 bg-red-50 border-b border-red-100" x-text="error"></div>
        </template>

        <template x-if="!error && runs.length === 0">
            <p class="text-gray-500 text-center py-10">No monitoring runs found</p>
        </template>

        <template x-if="runs.length > 0">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Run ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Timestamp</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Mode</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Findings</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Duration</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200">
                        <template x-for="run in runs" :key="run.id">
                            <tr class="hover:bg-gray-50 cursor-pointer" @click="window.location.href = `/runs/${run.id}`">
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-blue-600" x-text="run.id"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(run.timestamp)"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" x-text="run.execution_mode"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" x-text="run.overall_status || 'unknown'"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" x-text="run.findings_count"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700" x-text="formatDuration(run.duration_seconds)"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function runsPage() {
        return {
            runs: [],
            error: '',
            filters: {
                execution_mode: '',
                status: ''
            },

            async init() {
                await this.loadRuns();
            },

            async loadRuns() {
                try {
                    this.error = '';
                    const params = new URLSearchParams({ page: '1', page_size: '50' });

                    if (this.filters.execution_mode) {
                        params.set('execution_mode', this.filters.execution_mode);
                    }
                    if (this.filters.status) {
                        params.set('status', this.filters.status);
                    }

                    const response = await fetch(`/api/runs?${params.toString()}`);
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    const data = await response.json();
                    this.runs = data.items || [];
                } catch (error) {
                    this.error = `Failed to load runs: ${error.message}`;
                    this.runs = [];
                }
            },

            async applyFilters() {
                await this.loadRuns();
            },

            async resetFilters() {
                this.filters.execution_mode = '';
                this.filters.status = '';
                await this.loadRuns();
            },

            formatDate(value) {
                if (!value) return '-';
                return new Date(value).toLocaleString();
            },

            formatDuration(value) {
                if (value == null) return '-';
                return `${Number(value).toFixed(1)}s`;
            }
        };
    }
</script>
{% endblock %}
