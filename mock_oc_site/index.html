<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Operation Console Sign In</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="signin-page">
    <main class="signin-shell">
      <section class="signin-card">
        <p class="signin-overline">Operation Console</p>
        <h1>Sign in to continue</h1>
        <p class="signin-copy">
          Use your Coprote ID through Single Sign-On to access the dashboard.
        </p>
        <button id="coprote-sso" class="sso-btn" type="button">
          Sign in with Coprote ID (SSO)
        </button>
        <p class="signin-note">Mock login flow for local testing.</p>
      </section>
    </main>

    <script>
      const ssoButton = document.getElementById("coprote-sso");
      ssoButton.addEventListener("click", () => {
        window.location.href = "dashboard.html";
      });
    </script>
  </body>
</html>
